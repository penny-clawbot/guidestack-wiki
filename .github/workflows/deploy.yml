name: Build & Deploy Guidestack

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: output/sites/unified/node_modules/.package-lock.json

      - name: Install dependencies
        run: cd output/sites/unified && npm install --silent

      - name: Build Astro
        run: cd output/sites/unified && npx astro build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: guidestack-wiki
          directory: output/sites/unified/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}